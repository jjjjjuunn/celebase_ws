services:
  user-service:
    environment:
      AUTH_PROVIDER: dev
      INTERNAL_JWT_SECRET: dev-secret-not-for-prod

  # LLM 개인화 식단 (IMPL-APP-005) — dev 로컬 활성화용.
  # OPENAI_API_KEY에 실제 키를 넣고 ENABLE_LLM_MEAL_PLANNER를 true로 변경 후 재기동.
  # staging/prod는 이 블록 사용 금지 — 롤아웃 게이트(IMPL-APP-006) 완료 전까지 off 유지.
  meal-plan-engine:
    # IMPL-AI-002 Phase 2.1 — .env 파일을 컨테이너에 마운트하여 OPENAI_API_KEY +
    # ENABLE_LLM_MEAL_PLANNER + LLM_* 변수를 한 곳(.env, gitignored)에서 관리.
    env_file:
      - services/meal-plan-engine/.env
