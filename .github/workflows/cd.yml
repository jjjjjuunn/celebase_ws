name: CD — Staging Deploy

on:
  # 수동 트리거: GitHub Actions 탭에서 "Run workflow" 클릭
  workflow_dispatch:
    inputs:
      service:
        description: 'Deploy target'
        required: true
        default: 'all'
        type: choice
        options:
          - user-service
          - web
          - all

  # CI 통과 후 main 브랜치 push 시 자동 실행
  push:
    branches: [main]
    paths:
      - 'services/user-service/**'
      - 'apps/web/**'
      - 'packages/shared-types/**'
      - 'packages/service-core/**'
      - 'packages/ui-kit/**'
      - 'packages/design-tokens/**'
      - 'docker/caddy/**'
      - 'docker-compose.yml'
      - 'scripts/preflight-env.sh'
      - '.github/workflows/cd.yml'

concurrency:
  group: cd-staging
  cancel-in-progress: false  # 배포는 취소하지 않음

env:
  AWS_REGION: us-west-2

# ────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   AWS_ACCESS_KEY_ID        — ECR push + Secrets Manager read 권한
#   AWS_SECRET_ACCESS_KEY
#   ECR_REGISTRY             — e.g. 123456789012.dkr.ecr.us-west-2.amazonaws.com
#   STAGING_SSH_KEY          — staging 서버 SSH 비밀키 (PEM, base64)
#   STAGING_SERVER_IP        — staging 서버 IP (elastic IP 권장 — CHORE-MOBILE-STAGING-BFF-001 P1)
#   STAGING_SERVER_USER      — staging 서버 SSH 유저 (e.g. ubuntu, ec2-user)
#   STAGING_DOMAIN           — public hostname (e.g. staging.celebbase.com)
#                              — build-arg for NEXT_PUBLIC_WS_* + Caddy LE issuance
#
# 서버 사전 준비 (operator):
#   1. EC2 + Elastic IP attach
#   2. Route53 A record <STAGING_DOMAIN> → elastic IP
#   3. Security group inbound 80/443 open (LE HTTP-01 + HTTPS)
#   4. Docker + docker compose installed
#   5. /app/docker-compose.yml + /app/.env.staging (web + user-service env vars)
#   6. ECR repos: celebase-user-service, celebase-web
#   7. NTP synchronized (timedatectl)
# ────────────────────────────────────────────────────────────────────────────

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: CI 게이트 — typecheck/lint/build 통과 확인
  # ──────────────────────────────────────────────────────────────────────────
  ci-gate:
    name: "✅ CI Gate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @celebbase/shared-types build
          pnpm --filter @celebbase/service-core build

      - name: Typecheck user-service
        run: pnpm --filter @celebbase/user-service typecheck

      - name: Test user-service
        run: pnpm --filter @celebbase/user-service test
        env:
          NODE_ENV: test

      # web BFF (mobile gateway) — typecheck + build only (jest test slow on CI)
      - name: Typecheck web
        run: pnpm --filter web typecheck

      - name: Build web
        run: pnpm --filter web build
        env:
          # build-time NEXT_PUBLIC_* injection — placeholder values for CI build verification.
          # Real values are injected in the build-push job below.
          NEXT_PUBLIC_WS_URL: wss://${{ secrets.STAGING_DOMAIN || 'staging.example.com' }}
          NEXT_PUBLIC_WS_HOST: ${{ secrets.STAGING_DOMAIN || 'staging.example.com' }}

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Docker 이미지 빌드 → ECR push
  # ──────────────────────────────────────────────────────────────────────────
  build-push:
    name: "🐳 Build & Push"
    runs-on: ubuntu-latest
    needs: ci-gate
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
      user_service_image: ${{ steps.push-user.outputs.image }}
      web_image: ${{ steps.push-web.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push user-service
        id: push-user
        if: github.event.inputs.service == 'user-service' || github.event.inputs.service == 'all' || github.event_name == 'push'
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ steps.vars.outputs.short_sha }}
        run: |
          docker build \
            -t "$ECR_REGISTRY/celebase-user-service:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/celebase-user-service:staging-latest" \
            -f services/user-service/Dockerfile \
            .
          docker push "$ECR_REGISTRY/celebase-user-service:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/celebase-user-service:staging-latest"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            "$ECR_REGISTRY/celebase-user-service:$IMAGE_TAG")
          echo "image=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "USER_SERVICE_IMAGE_REF=$DIGEST" >> "$GITHUB_ENV"

      - name: Build and push web (BFF)
        id: push-web
        if: github.event.inputs.service == 'web' || github.event.inputs.service == 'all' || github.event_name == 'push'
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ steps.vars.outputs.short_sha }}
          STAGING_DOMAIN: ${{ secrets.STAGING_DOMAIN }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_WS_URL=wss://${STAGING_DOMAIN} \
            --build-arg NEXT_PUBLIC_WS_HOST=${STAGING_DOMAIN} \
            -t "$ECR_REGISTRY/celebase-web:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/celebase-web:staging-latest" \
            -f apps/web/Dockerfile \
            .
          docker push "$ECR_REGISTRY/celebase-web:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/celebase-web:staging-latest"
          # Capture full image ref (with digest) for rollback target.
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            "$ECR_REGISTRY/celebase-web:$IMAGE_TAG")
          echo "image=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "WEB_IMAGE_REF=$DIGEST" >> "$GITHUB_ENV"

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Staging 서버에 배포 (SSH) + preflight + auto-rollback
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy to Staging"
    runs-on: ubuntu-latest
    needs: build-push
    environment: staging

    steps:
      - uses: actions/checkout@v4
        with:
          # Sparse — preflight script + .env.staging.required + Caddyfile.
          sparse-checkout: |
            scripts/preflight-env.sh
            apps/web/.env.staging.required
            docker/caddy/Caddyfile
          sparse-checkout-cone-mode: false

      - name: Write SSH key
        env:
          SSH_KEY_B64: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          echo "$SSH_KEY_B64" | base64 -d > /tmp/staging_key
          chmod 600 /tmp/staging_key

      - name: Upload preflight script + required manifest + Caddyfile
        env:
          HOST: ${{ secrets.STAGING_SERVER_IP }}
          REMOTE_USER: ${{ secrets.STAGING_SERVER_USER }}
        run: |
          # Pre-create remote dirs (sparse-checkout only fetches files, no dirs).
          ssh -i /tmp/staging_key -o StrictHostKeyChecking=no "$REMOTE_USER@$HOST" \
            "mkdir -p /app/scripts /app/apps/web /app/docker/caddy"

          # preflight script (executable)
          scp -i /tmp/staging_key -o StrictHostKeyChecking=no \
            scripts/preflight-env.sh \
            "$REMOTE_USER@$HOST:/app/scripts/preflight-env.sh"

          # .env.staging.required (preflight manifest — partial staging: 8 required keys)
          scp -i /tmp/staging_key -o StrictHostKeyChecking=no \
            apps/web/.env.staging.required \
            "$REMOTE_USER@$HOST:/app/apps/web/.env.staging.required"

          # Caddyfile (staging-specific, safe to overwrite — Caddy reads {$STAGING_DOMAIN} env)
          # NOTE: docker-compose.yml is NOT scp'd — staging EC2 has a staging-specific
          # compose (db/redis/user-service) and overwriting would break existing services.
          # The web/caddy service blocks must be appended manually to /app/docker-compose.yml
          # (one-time per host — see docs/IMPLEMENTATION_LOG.md entry for snippets).
          scp -i /tmp/staging_key -o StrictHostKeyChecking=no \
            docker/caddy/Caddyfile \
            "$REMOTE_USER@$HOST:/app/docker/caddy/Caddyfile"

      - name: Deploy via SSH
        env:
          HOST: ${{ secrets.STAGING_SERVER_IP }}
          REMOTE_USER: ${{ secrets.STAGING_SERVER_USER }}
        run: |
          ssh -i /tmp/staging_key -o StrictHostKeyChecking=no "$REMOTE_USER@$HOST" bash -s <<'ENDSSH'
          # GitHub Actions context variables are interpolated by the yaml engine
          # BEFORE the heredoc reaches the remote shell. The quoted ENDSSH then
          # protects $LOCAL_VARS on the remote side from premature expansion.
          set -euo pipefail
          cd /app

          STAGING_DOMAIN='${{ secrets.STAGING_DOMAIN }}'
          ECR_REGISTRY='${{ secrets.ECR_REGISTRY }}'
          WEB_IMAGE_REF='${{ needs.build-push.outputs.web_image }}'
          # github.event.inputs is empty for push triggers — fall back to 'all'.
          SERVICE_INPUT='${{ github.event.inputs.service }}'
          DEPLOY_TARGET="${SERVICE_INPUT:-all}"

          # Input allowlist validation — defense in depth against accidental
          # secret corruption that would otherwise inject into shell / compose.
          if ! [[ "${STAGING_DOMAIN}" =~ ^[a-zA-Z0-9.-]+$ ]]; then
            echo "❌ invalid STAGING_DOMAIN format"; exit 1
          fi
          if ! [[ "${ECR_REGISTRY}" =~ ^[0-9]+\.dkr\.ecr\.[a-z0-9-]+\.amazonaws\.com$ ]]; then
            echo "❌ invalid ECR_REGISTRY format"; exit 1
          fi
          if [ -n "${WEB_IMAGE_REF}" ] && ! [[ "${WEB_IMAGE_REF}" =~ ^[a-zA-Z0-9._/:@-]+$ ]]; then
            echo "❌ invalid WEB_IMAGE_REF format"; exit 1
          fi
          case "${DEPLOY_TARGET}" in
            user-service|web|all) ;;
            *) echo "❌ invalid DEPLOY_TARGET: ${DEPLOY_TARGET}"; exit 1 ;;
          esac

          # Export vars consumed by docker compose interpolation (image: ${WEB_IMAGE_REF}
          # in docker-compose.yml, STAGING_DOMAIN: ${STAGING_DOMAIN:?...} in caddy svc).
          # Plain shell assignment is NOT enough — compose reads from the process
          # environment, not from the parent shell's local scope.
          export STAGING_DOMAIN ECR_REGISTRY WEB_IMAGE_REF

          echo "▶ Deploy target: ${DEPLOY_TARGET}"
          chmod +x /app/scripts/preflight-env.sh

          # 1. Capture rollback target — prefer ECR digest (immutable across tag
          # moves), fall back to local image ID (.Image, content-addressed).
          # tag-only refs are unsafe: same tag pulled later may resolve to a
          # different (the broken) image → infinite rollback loop.
          PREVIOUS_WEB_REF=""
          if WEB_CID=$(docker compose ps -q web 2>/dev/null) && [ -n "${WEB_CID}" ]; then
            DIGEST_REF=$(docker inspect "${WEB_CID}" --format='{{range .RepoDigests}}{{.}}{{"\n"}}{{end}}' 2>/dev/null | head -1 || true)
            if [ -n "${DIGEST_REF}" ]; then
              PREVIOUS_WEB_REF="${DIGEST_REF}"
              echo "▶ rollback target (ECR digest): ${PREVIOUS_WEB_REF}"
            else
              IMAGE_ID=$(docker inspect "${WEB_CID}" --format='{{.Image}}' 2>/dev/null || true)
              if [ -n "${IMAGE_ID}" ]; then
                PREVIOUS_WEB_REF="${IMAGE_ID}"
                echo "▶ rollback target (local image ID): ${PREVIOUS_WEB_REF}"
                echo "   (note: local-only — re-build required if image is GC'd)"
              fi
            fi
          fi
          if [ -n "${PREVIOUS_WEB_REF}" ]; then
            echo "${PREVIOUS_WEB_REF}" > /app/.web-previous-ref
          else
            echo "▶ no prior web container — initial deploy"
          fi

          # 2. ECR login.
          aws ecr get-login-password --region us-west-2 | \
            docker login --username AWS --password-stdin "${ECR_REGISTRY}"

          # 3. Preflight (skip if user-service-only deploy — web env not relevant).
          if [ "${DEPLOY_TARGET}" != "user-service" ]; then
            bash /app/scripts/preflight-env.sh apps/web
          fi

          # 4. Pull + recreate target services.
          case "${DEPLOY_TARGET}" in
            user-service)
              docker compose pull user-service
              docker compose up -d --force-recreate user-service
              ;;
            web)
              docker compose pull web caddy
              docker compose up -d --force-recreate web caddy
              ;;
            all)
              docker compose pull user-service web caddy
              docker compose up -d --force-recreate user-service web caddy
              ;;
          esac

          # 5. Healthcheck — deadline-based so total wall time is bounded.
          if [ "${DEPLOY_TARGET}" = "user-service" ]; then
            deadline=$((SECONDS + 60))
            while [ "${SECONDS}" -lt "${deadline}" ]; do
              if curl -fsS --max-time 5 http://localhost:3001/health; then
                echo "✅ user-service healthy (${SECONDS}s)"
                exit 0
              fi
              sleep 5
            done
            echo "❌ user-service healthcheck failed (${SECONDS}s window)"
            exit 1
          else
            # web + caddy: probe public HTTPS endpoint. 180s deadline covers
            # LE cert issuance + Caddy startup + Next cold start (plan v3 §B-6).
            HEALTH_URL="https://${STAGING_DOMAIN}/api/health"
            deadline=$((SECONDS + 180))
            while [ "${SECONDS}" -lt "${deadline}" ]; do
              if curl -fsS --max-time 5 "${HEALTH_URL}"; then
                echo "✅ ${HEALTH_URL} healthy (${SECONDS}s)"
                exit 0
              fi
              sleep 10
            done
            echo "❌ public healthcheck failed (${SECONDS}s window) — attempting auto-rollback"

            # 6. Auto-rollback (web only — caddy + user-service rarely break).
            if [ -n "${PREVIOUS_WEB_REF}" ]; then
              echo "▶ rolling web back to ${PREVIOUS_WEB_REF}"
              # NOTE: rollback ref MUST be a digest or local image ID, never
              # a tag — tags can be moved by the just-failed `docker compose
              # pull`, which would re-pull the broken image.
              export WEB_IMAGE_REF="${PREVIOUS_WEB_REF}"
              docker compose up -d --force-recreate web
              sleep 15
              if curl -fsS --max-time 5 "${HEALTH_URL}"; then
                echo "⚠️  rolled back successfully — investigate broken commit"
                exit 1
              fi
              echo "⚠️  rollback also failed — manual intervention required on staging EC2"
            else
              echo "⚠️  no rollback target — manual intervention required"
            fi
            exit 1
          fi
          ENDSSH

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deployed: ${{ github.event.inputs.service || 'all' }} (sha ${{ needs.build-push.outputs.short_sha }})"
          if [ -n "${{ needs.build-push.outputs.web_image }}" ]; then
            echo "  web: ${{ needs.build-push.outputs.web_image }}"
          fi
          if [ -n "${{ needs.build-push.outputs.user_service_image }}" ]; then
            echo "  user-service: ${{ needs.build-push.outputs.user_service_image }}"
          fi
